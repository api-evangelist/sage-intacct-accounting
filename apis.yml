aid: sage-intacct-accounting
name: Sage Intacct Accounting
description: >-
  Sage Intacct is a cloud-based accounting and financial management platform
  positioned for mid-market businesses, multi-entity organizations, nonprofits,
  and accounting firms. It delivers core accounting (general ledger, accounts
  payable, accounts receivable, cash management, order management, purchasing)
  alongside advanced capabilities for revenue recognition, project accounting,
  multi-entity consolidations, and dimensional reporting. The Sage Intacct REST
  API provides programmatic access to accounting and financial objects using
  OAuth 2.0 Bearer token authentication.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
